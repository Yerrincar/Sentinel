Version: 1
Settings:
    Polling:
        Interval: 1s
    Workspace:
        Name: Home Lab Sentinel Demo Video
Services:
    - Id: sentinel-docker-demo-id
      Name: Docker-Demo
      Docker:
        Container: sentinel-docker-demo
      Type: docker
      Url: ""
    - Id: sentinel-systemd-demo-id
      Name: Systemd-Demo
      Systemd:
        Unit: sentinel-systemd-demo.service
      Type: systemd
    - Id: sentinel-k8s-demo-id
      Name: K8s-Demo
      K8s:
        Context: k3d-sentinel
        Namespace: sentinel-demo
        Deployment: sentinel-k8s-demo
      Type: k8s
    - Id: sentinel-docker-demo-2-id
      Name: sentinel-docker-demo-2
      Docker:
        Container: sentinel-docker-demo-2
      K8s:
        Context: ""
        Namespace: ""
        Deployment: ""
      Systemd:
        Unit: ""
      Type: docker
      Url: ""
    - Id: sentinel-docker-demo-3
      Name: sentinel-3
      Docker:
        Container: sentinel-docker-demo-3
      K8s:
        Context: ""
        Namespace: ""
        Deployment: ""
